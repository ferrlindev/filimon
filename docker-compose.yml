# ═══════════════════════════════════════════════════════════════════════════════
# filimon – docker-compose.yaml
#
# Services:
#   filimon          – the WISE crawler (default)
#   model-downloader – one-shot helper to pull a GLiNER model from Hugging Face
#                      run with: docker compose --profile setup up model-downloader
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ── Main crawler service ────────────────────────────────────────────────────
  filimon:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    image: filimon:latest
    container_name: filimon

    volumes:
      # GLiNER model files – read-only; the container never writes model weights.
      - ./models:/app/models:ro
      # Extraction results – wise_output.json is written here by Stage 4.
      - ./output:/app/output

    environment:
      RUST_LOG: "info"

      # Paths consumed by NerEngine::new() in scorer.rs.
      # Change the model variant here without rebuilding the image.
      TOKENIZER_PATH: "/app/models/gliner_small-v2.1/tokenizer.json"
      MODEL_PATH: "/app/models/gliner_small-v2.1/onnx/model.onnx"
      OUTPUT_PATH: "/app/output/wise_output.json"

      # ONNX Runtime CPU thread cap – tune to your host core count.
      ORT_NUM_THREADS: "4"

    # Default command – override at runtime:
    #   docker compose run --rm filimon crawl https://techcrunch.com
    #   docker compose run --rm filimon file /app/models/sample.html
    #   docker compose run --rm filimon --ls /watch
    command: ["--help"]

    restart: "no" # one-shot crawler; change to "unless-stopped" for watch mode

    # Uncomment to cap resource usage on shared hosts.
    # GLiNER small requires ~1.5 GB; allow at least 2 GB headroom.
    # deploy:
    #   resources:
    #     limits:
    #       cpus: "4"
    #       memory: 6g

  # ── One-shot model downloader ───────────────────────────────────────────────
  # Downloads a GLiNER model from Hugging Face into ./models.
  # Gated behind the "setup" profile so it never starts with `docker compose up`.
  #
  # Usage:
  #   docker compose --profile setup up model-downloader
  #
  # Override MODEL_ID to download a different variant:
  #   MODEL_ID=knowledgator/gliner-multitask-large-v0.5 \
  #     docker compose --profile setup up model-downloader
  model-downloader:
    image: python:3.12-slim
    profiles: ["setup"]

    volumes:
      - ./models:/models

    environment:
      MODEL_ID: "urchade/gliner_small-v2.1"
      LOCAL_DIR: "/models/gliner_small-v2.1"
      # HF_TOKEN: "${HF_TOKEN}"   # uncomment for gated/private repos

    command:
      - bash
      - -c
      - |
        pip install -q huggingface_hub &&
        python - <<'PYEOF'
        import os
        from huggingface_hub import snapshot_download
        snapshot_download(
            repo_id=os.environ['MODEL_ID'],
            local_dir=os.environ['LOCAL_DIR'],
            ignore_patterns=['*.pt', '*.bin', 'flax_model*', 'tf_model*'],
        )
        print('Model ready at', os.environ['LOCAL_DIR'])
        PYEOF
